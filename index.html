<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>環境保衛戰 - Boss回歸與垃圾桶強化版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style> body { margin: 0; overflow: hidden; background: #50a03c; touch-action: none; } </style>
</head>
<body>
<script>
let player, bullets = [], enemies = [], deadQueue = [], bossBullets = [], boss;
let imgs = []; 
let binImgs = []; 
let gameOver = false, score = 0, totalCleaned = 0, TARGET_CLEANED = 15; 
let bins = [];
let currentCarryType = -1, screenShake = 0;
let leftJoy = { active: false, id: -1, x: 0, y: 0, currX: 0, currY: 0 };
let rightJoy = { active: false, id: -1, x: 0, y: 0, currX: 0, currY: 0 };
let joySize = 130;

const TYPE_GENERAL = 0, TYPE_GLASS = 1, TYPE_PAPER_BOX = 2, TYPE_PLASTIC = 3, TYPE_ALUMINUM = 4;

function preload() {
    // 怪物圖片
    imgs[0] = loadImage('怪物1號.png'); 
    imgs[1] = loadImage('怪物二號.png'); 
    imgs[2] = loadImage('怪物三號.png'); 
    imgs[3] = loadImage('怪物四號.png'); 
    imgs[4] = loadImage('怪物1號.png'); 

    // 垃圾桶圖片 (.jpg)
    binImgs[TYPE_GENERAL] = { close: loadImage('一般垃圾桶.jpg'), open: loadImage('一般垃圾桶打開.jpg') };
    binImgs[TYPE_GLASS] = { close: loadImage('玻璃回收桶.jpg'), open: loadImage('玻璃回收桶打開.jpg') };
    binImgs[TYPE_PAPER_BOX] = { close: loadImage('紙餐盒回收桶.jpg'), open: loadImage('紙餐盒回收桶打開.jpg') };
    binImgs[TYPE_PLASTIC] = { close: loadImage('塑膠瓶回收桶.jpg'), open: loadImage('塑膠瓶回收桶打開.jpg') };
    binImgs[TYPE_ALUMINUM] = { close: loadImage('鋁箔包回收桶.jpg'), open: loadImage('鋁箔包回收桶打開.jpg') };
}

function setup() { 
    createCanvas(windowWidth, windowHeight); 
    player = new Player(); 
    let spacing = width / 5;
    for(let i=0; i<5; i++) {
        bins.push({ 
            x: spacing * i + spacing/2, 
            y: height - 135, 
            w: 160, // 增加垃圾桶圖示寬度
            h: 180, // 增加垃圾桶圖示高度
            type: i, 
            isOpen: false 
        });
    }
}

function draw() {
    if (gameOver) {
        background(0, 200); fill(255); textAlign(CENTER); textSize(40);
        text("環境守護失敗！", width/2, height/2);
        textSize(20); text("點擊重新開始", width/2, height/2 + 50);
        return;
    }
    if (screenShake > 0) { translate(random(-screenShake, screenShake), random(-screenShake, screenShake)); screenShake *= 0.9; }
    
    background(80, 160, 60); 
    drawGrass();
    handleInput();
    drawPhotoBins();
    
    player.update(); 
    player.display();

    // 生成怪物與 Boss 判定
    if (totalCleaned < TARGET_CLEANED) {
        if (frameCount % 80 === 0 && enemies.length < 8) enemies.push(new NightMarketMonster());
    } else if (!boss) { 
        boss = new StyrofoamTitan(); // 保麗龍泰坦回歸
        enemies = []; 
    }

    if (boss) { 
        boss.update(); boss.display(); 
        if (boss.hp <= 0) {
            noLoop(); background(0, 200); fill(0, 255, 100); textAlign(CENTER); 
            textSize(35); text("成功淨化保麗龍泰坦！", width/2, height/2);
        } 
    }
    
    processGameLogic(); 
    drawUI();
    drawJoystick(leftJoy, color(0, 200, 255, 80));
}

function drawPhotoBins() {
    imageMode(CENTER);
    for (let b of bins) {
        let d = dist(player.x, player.y, b.x, b.y);
        // 如果攜帶正確垃圾且距離小於 220 則打開
        b.isOpen = (currentCarryType === b.type && d < 220);
        
        fill(0, 40); noStroke(); ellipse(b.x, b.y + 80, b.w * 0.8, 30);
        
        if (b.isOpen) {
            // 回收偵測光圈
            noFill(); stroke(255, 255, 255, 200); strokeWeight(8);
            ellipse(b.x, b.y + 20, b.w * 1.2, b.h * 0.8);
        }

        let imgObj = binImgs[b.type];
        if (imgObj && imgObj.close.width > 1) {
            image(b.isOpen ? imgObj.open : imgObj.close, b.x, b.y, b.w, b.h);
        }
    }
}

class Player {
    constructor() { this.x = width/2; this.y = height*0.5; this.vx = 0; this.vy = 0; this.hp = 100; }
    update() {
        this.vx *= 0.85; this.vy *= 0.85; this.x += this.vx; this.y += this.vy;
        this.x = constrain(this.x, 30, width-30); this.y = constrain(this.y, 30, height-320);
    }
    display() {
        push(); translate(this.x, this.y); if (this.vx < -0.1) scale(-1, 1);
        fill(255); noStroke(); ellipse(0, 0, 45, 45);
        fill(255, 50, 50); ellipse(-10, -5, 6, 8); ellipse(10, -5, 6, 8);
        pop();
    }
}

class NightMarketMonster {
    constructor() { this.x = random(width); this.y = -50; this.hp = 2; this.imgIndex = floor(random(5)); this.isPickedUp = false; }
}

class StyrofoamTitan {
    constructor() { 
        this.x = width/2; this.y = -200; this.targetY = 200; 
        this.hp = 350; this.maxHp = 350; 
    }
    update() { 
        if (this.y < this.targetY) this.y += 3; 
        this.x = width/2 + sin(frameCount * 0.02) * (width/3); 
        if (frameCount % 90 === 0) this.shotgunAttack(); 
    }
    shotgunAttack() { 
        let a = atan2(player.y - this.y, player.x - this.x); 
        for (let i = -2; i <= 2; i++) bossBullets.push(new Bullet(this.x, this.y, a + i * 0.2, true)); 
    }
    display() { 
        push(); translate(this.x, this.y); 
        fill(245); stroke(200); strokeWeight(3); rectMode(CENTER); rect(0, 0, 110, 120, 10); 
        fill(255, 50, 50); noStroke(); rect(-100, -100, map(this.hp, 0, this.maxHp, 0, 200), 15, 5); 
        pop(); 
    }
}

class Bullet {
    constructor(x, y, a, isBoss = false) { this.x = x; this.y = y; this.a = a; this.isBoss = isBoss; this.speed = isBoss ? 6 : 12; }
    update() { this.x += cos(this.a)*this.speed; this.y += sin(this.a)*this.speed; }
    display() { fill(this.isBoss?255:0, 255, 200); ellipse(this.x, this.y, 10, 10); }
}

function processGameLogic() {
    // 子彈處理
    for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].update(); bullets[i].display();
        if (boss && dist(bullets[i].x, bullets[i].y, boss.x, boss.y) < 60) { boss.hp -= 5; bullets.splice(i, 1); continue; }
        for (let j = enemies.length - 1; j >= 0; j--) {
            if (dist(bullets[i].x, bullets[i].y, enemies[j].x, enemies[j].y) < 40) {
                enemies[j].hp--; if (enemies[j].hp <= 0) { deadQueue.push(enemies[j]); enemies.splice(j, 1); }
                bullets.splice(i, 1); break;
            }
        }
    }

    // 怪物行動
    for (let e of enemies) {
        let a = atan2(player.y-e.y, player.x-e.x); e.x += cos(a)*2; e.y += sin(a)*2;
        if (imgs[e.imgIndex]) image(imgs[e.imgIndex], e.x, e.y, 55, 55);
        if (dist(e.x, e.y, player.x, player.y) < 40) player.hp -= 0.3;
    }

    // 拾取與回收
    let pickedUpList = deadQueue.filter(e => e.isPickedUp);
    if (pickedUpList.length === 0) currentCarryType = -1;
    
    for (let i = deadQueue.length - 1; i >= 0; i--) {
        let e = deadQueue[i];
        if (!e.isPickedUp) {
            if (dist(player.x, player.y, e.x, e.y) < 70) {
                if (currentCarryType === -1 || e.imgIndex === currentCarryType) { e.isPickedUp = true; currentCarryType = e.imgIndex; }
            }
        } else {
            e.x = lerp(e.x, player.x, 0.2); e.y = lerp(e.y, player.y + 45, 0.2);
            let b = bins[e.imgIndex];
            // 判定範圍大幅加寬至 130
            if (dist(e.x, e.y, b.x, b.y) < 130) {
                score += 100; totalCleaned++; player.hp = min(100, player.hp + 10);
                deadQueue.splice(i, 1); continue;
            }
        }
        if (imgs[e.imgIndex]) { push(); if(e.isPickedUp) tint(255, 180); image(imgs[e.imgIndex], e.x, e.y, 45, 45); pop(); }
    }

    // Boss 子彈
    for (let i = bossBullets.length-1; i >= 0; i--) {
        let b = bossBullets[i]; b.update(); b.display(); 
        if (dist(b.x, b.y, player.x, player.y) < 30) { player.hp -= 10; bossBullets.splice(i, 1); screenShake = 8; }
    }
    if (player.hp <= 0) gameOver = true;
}

function drawGrass() { stroke(60, 140, 50); for(let i=50; i<width; i+=150) { for(let j=50; j<height; j+=150) line(i, j, i-5, j+10); } }

function handleInput() {
    if (keyIsDown(65) || keyIsDown(LEFT_ARROW)) player.vx -= 2.2;
    if (keyIsDown(68) || keyIsDown(RIGHT_ARROW)) player.vx += 2.2;
    if (keyIsDown(87) || keyIsDown(UP_ARROW)) player.vy -= 2.2;
    if (keyIsDown(83) || keyIsDown(DOWN_ARROW)) player.vy += 2.2;
    
    if (mouseIsPressed && frameCount % 8 === 0) {
        bullets.push(new Bullet(player.x, player.y, atan2(mouseY-player.y, mouseX-player.x)));
    }
}

function drawUI() { fill(255); noStroke(); textSize(22); text(`生命: ${floor(player.hp)}%  回收: ${totalCleaned}/${TARGET_CLEANED}`, 20, 40); }
function touchStarted() { if (gameOver) location.reload(); return false; }
function mousePressed() { if (gameOver) location.reload(); }
function drawJoystick(joy, col) { if (joy.active) { fill(col); ellipse(joy.x, joy.y, joySize); } }
function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
